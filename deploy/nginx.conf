# BallistiCore — Nginx configuration
# Place this file at: C:\nginx\conf\nginx.conf
# (replace the default nginx.conf that ships with Nginx for Windows)

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Increase buffer sizes for file downloads (permit PDFs, Excel exports)
    client_max_body_size 20m;
    proxy_buffer_size       128k;
    proxy_buffers         4 256k;
    proxy_busy_buffers_size 256k;

    server {
        listen 80;

        # ── Change this to the server's LAN IP or hostname ──
        # server_name 192.168.1.100;
        server_name _;

        root C:/sites/BallistiCore/BallistiCore_app/frontend/dist;
        index index.html;

        # ── API — proxy to FastAPI on port 8000 ──────────────
        location /api/ {
            proxy_pass         http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            # Permit PDF download support
            proxy_read_timeout 120s;
        }

        # ── Health check (also proxied to FastAPI) ───────────
        location /health {
            proxy_pass http://127.0.0.1:8000;
        }

        # ── React SPA — all other routes serve index.html ────
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── Static assets — long cache ────────────────────────
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
